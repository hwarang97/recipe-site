{% extends "base.html" %}
{% block style %}
<style>
    body {
        font-family: Arial;
        margin: 0;
        padding: 20px;
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .right-menu {
        gap: 20px;
        margin-left: auto;
    }

    .food-container {
        margin-top: 40px;
    }

    .cards {
        display: flex;
        gap: 30px;
        margin-top: 20px;
    }

    .card {
        width: 30%;
        border: 1px solid #ccc;
        border-radius: 10px;
        padding: 10px;
        text-align: center;
    }

    .card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 8px;
    }
</style>
{% endblock %}
