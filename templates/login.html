<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>오늘뭐먹지</title>
</head>

<body>
    <div>
        <p>logo</p>
        <img src="{{ logo_location }}" alt="">
    </div>

    <div>
        <h2>로그인/회원가입<h2>
    </div>

    <div>
        <div>
            <label for="user_id">ID</label>
            <input type="text" name="user_id" id="user_id" required>
        </div>

        <div>
            <label for="user_password">PW/</label>
            <input type="text" name="user_password" id="user_password" required>
        </div>

        <button onclick="authenticate()">로그인</button>
    </div>

    <div>
        <p>find ID</p>
        <a href="{{ url_for('find') }}">password</a>
        <a href="{{ url_for('signin') }}">sign in</a>
    </div>

    <script>
        function authenticate() {
            $.ajax({
                type: "POST",
                url: "{{ url_for('login') }}",
                data: { "id": $('#user_id').val(), "password": $('#user_password').val() },
                success: function (response) {
                    if (response.result === "success") {
                        alert("로그인 성공!");
                    }
                    else {
                        alert("유효하지 않은 유저 정보");
                    }
                }
            })
        }
    </script>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
</body>

</html>
