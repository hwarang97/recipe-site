{% extends 'base.html' %}
{% block style %}
<style>

body{
    font-family: Arial;
    margin:0;
    padding:20px;
}

/* 상단 */
.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* + 버튼 */
.add-btn{
    font-size:24px;
    border:1px solid #999;
    border-radius:50%;
    width:35px;
    height:35px;
    text-align:center;
    line-height:33px;
    text-decoration:none;
    color:black;
}

/* 프로필 영역 */
.profile{
    display:flex;
    align-items:center;
    gap:30px;
}

.profile img{
    width:150px;
    height:150px;
    border-radius:50%;
    border:2px solid #ccc;
}

/* 게시글 영역 */
.post-area{
    margin-top:40px;
}

/* 게시글 제목 */
.post-title{
    border:2px solid #ccc;
    border-radius:10px;
    padding:15px;
    text-align:center;
    margin-bottom:20px;
}

/* 게시글 카드 */
.post-list{
    display:flex;
    gap:30px;
}

.post-card{
    width:30%;
    text-align:center;
}

.post-card img{
    width:100%;
    height:150px;
    object-fit:cover;
    border:2px solid #ccc;
    border-radius:10px;
}

/* 버튼 */
.post-buttons{
    margin-top:10px;
}

.post-buttons button{
    padding:8px 20px;
    margin:5px;
    border:1px solid #999;
    background:white;
    border-radius:6px;
    cursor:pointer;
}

</style>
{% endblock %}
{% block content %}
<div class="top">
<h2>마이페이지</h2>

<!-- 게시글 작성 -->
<a href="write.html" class="add-btn">+</a>
</div>


<div class="profile">

<img src="profile.jpg">

<div>
<h3>이름</h3>
<p>자기소개</p>
</div>

</div>

<hr>

<div class="post-area">

<h3>게시글 영역</h3>

<div class="post-title">
게시글
</div>

<div class="post-list">


<!-- 게시물 1 -->
<div class="post-card">

<img src="western.jpg">

<div class="post-buttons">

<!-- 수정 -->
<a href="edit.html">
<button>수정</button>
</a>

<!-- 삭제 -->
<button onclick="deletePost(this)">삭제</button>

</div>

</div>


<!-- 게시물 2 -->
<div class="post-card">

<img src="western.jpg">

<div class="post-buttons">

<a href="edit.html">
<button>수정</button>
</a>

<button onclick="deletePost(this)">삭제</button>

</div>

</div>


<!-- 게시물 3 -->
<div class="post-card">

<img src="western.jpg">

<div class="post-buttons">

<a href="edit.html">
<button>수정</button>
</a>

<button onclick="deletePost(this)">삭제</button>

</div>

</div>


</div>

</div>


<script>

/* 삭제 기능 */
function deletePost(button){

    let post = button.closest(".post-card");
    post.remove();

}

</script>
{% endblock %}
</html>
